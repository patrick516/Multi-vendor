<svg width="260" height="260" viewBox="0 0 260 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="260" height="260" rx="40" fill="#FDFBF5"></rect>

  <!-- Rounded app icon -->
  <rect x="40" y="25" width="180" height="150" rx="30" fill="#0B6B31"></rect>

  <!-- Cart body -->
  <rect x="70" y="80" width="90" height="45" rx="10" fill="#FDD835"></rect>
  <!-- Cart handle -->
  <rect x="150" y="75" width="40" height="10" rx="5" fill="#FDD835"></rect>

  <!-- Cart base line -->
  <rect x="80" y="130" width="90" height="8" rx="4" fill="#FDD835"></rect>

  <!-- Cart wheels -->
  <circle cx="95" cy="150" r="9" fill="#FDD835"></circle>
  <circle cx="145" cy="150" r="9" fill="#FDD835"></circle>

  <!-- MULTI-VENDOR text -->
  <text x="130" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0B6B31">
    MULTI-VENDOR
  </text>
</svg>
